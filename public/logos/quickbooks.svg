<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="qbGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2CA01C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D9B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Green circle -->
  <circle cx="30" cy="30" r="24" fill="url(#qbGradient)"/>
  <!-- White QB -->
  <text x="14" y="43" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF">QB</text>
  <!-- QuickBooks text -->
